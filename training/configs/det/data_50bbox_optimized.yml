# Generated: 2025-10-02 21:35:00 KST
# PaddleOCR Detection Fine-tuning with 50 BBoxes - Optimized
# Base: PP-OCRv3 Detection Model
Global:
  debug: false
  use_gpu: true  # RTX 5070 with CUDA 12.9
  epoch_num: 50  # Increased from 30 for better convergence with more data
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: /home/pro301/paddleocr_training/output/data_50bbox_optimized/
  save_epoch_step: 5
  eval_batch_step: [0, 2000]  # Disable frequent evaluation
  cal_metric_during_train: false  # Disable to avoid ValueError
  pretrained_model: /home/pro301/git/en-zine/ocr_system/paddleocr_training/pretrained_models/ch_PP-OCRv3_det_distill_train/best_accuracy
  checkpoints: null
  use_visualdl: false
  infer_img: null
  save_res_path: ./output/det_db/predicts_db.txt
  distributed: false

Architecture:
  model_type: det
  algorithm: DB
  Transform:
  Backbone:
    name: MobileNetV3
    scale: 0.5
    model_name: large
    disable_se: True
  Neck:
    name: RSEFPN
    out_channels: 96
    shortcut: True
  Head:
    name: DBHead
    k: 50

Loss:
  name: DBLoss
  balance_loss: true
  main_loss_type: DiceLoss
  alpha: 5
  beta: 10
  ohem_ratio: 3

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0001  # Increased slightly from 0.00005 for 50 bboxes
    warmup_epoch: 2  # Increased from 1 for smoother warmup
  regularizer:
    name: L2
    factor: 5.0e-05

PostProcess:
  name: DBPostProcess
  thresh: 0.3
  box_thresh: 0.6
  max_candidates: 1000
  unclip_ratio: 1.5

Metric:
  name: DetMetric
  main_indicator: hmean

Train:
  dataset:
    name: SimpleDataSet
    data_dir: /home/pro301/paddleocr_training/data_new/
    label_file_list:
      - /home/pro301/git/en-zine/ocr_system/paddleocr_training/data/train_list.txt
    ratio_list: [1.0]
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - DetLabelEncode:
      - EastRandomCropData:
          size: [640, 640]
          max_tries: 10
          keep_ratio: true
      - MakeBorderMap:
          shrink_ratio: 0.4
          thresh_min: 0.3
          thresh_max: 0.7
      - MakeShrinkMap:
          shrink_ratio: 0.4
          min_text_size: 8
      - NormalizeImage:
          scale: 1./255.
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
          order: hwc
      - ToCHWImage:
      - KeepKeys:
          keep_keys: [image, threshold_map, threshold_mask, shrink_map, shrink_mask]
  loader:
    shuffle: true
    drop_last: false
    batch_size_per_card: 2  # Increased from 1 for better GPU utilization
    num_workers: 2  # Parallel data loading

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: /home/pro301/paddleocr_training/data_new/
    label_file_list:
      - /home/pro301/git/en-zine/ocr_system/paddleocr_training/data/val_list.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - DetLabelEncode:
      - DetResizeForTest:
      - NormalizeImage:
          scale: 1./255.
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
          order: hwc
      - ToCHWImage:
      - KeepKeys:
          keep_keys: [image, shape, polys, ignore_tags]
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 1
    num_workers: 0
