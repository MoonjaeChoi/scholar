# Generated: 2025-10-02 21:55:00 KST
# Ultra-Optimized Configuration for RTX 5070 12GB with 50 BBox Training
# Expected Performance: 80-95% GPU utilization, 8-10 hours for 50 epochs

Global:
  debug: false
  use_gpu: true
  epoch_num: 50
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: /home/pro301/paddleocr_training/output/data_50bbox_ultra/
  save_epoch_step: 5
  eval_batch_step: [0, 500, 1000]  # Evaluate at iterations 0, 500, 1000
  cal_metric_during_train: false  # Disable training metrics for speed

  # 🚀 Mixed Precision Training (AMP) - 2-3x speedup
  use_amp: true
  scale_loss: 1024.0
  use_dynamic_loss_scaling: true

  # 🔧 Gradient Accumulation - Effective batch size = 24 * 2 = 48
  grad_clip:
    name: ClipGradByGlobalNorm
    clip_norm: 10.0

  pretrained_model: null
  checkpoints: null
  use_visualdl: false
  infer_img: null
  save_res_path: /home/pro301/paddleocr_training/output/data_50bbox_ultra/predicts_db.txt
  distributed: false

  # 📊 Performance Optimization
  enable_mkldnn: false  # Use CUDA instead
  use_fp16: true  # Enable FP16 inference

Architecture:
  model_type: det
  algorithm: DB
  Transform: null
  Backbone:
    name: MobileNetV3
    scale: 0.5
    model_name: large
    disable_se: false
  Neck:
    name: DBFPN
    out_channels: 256
    use_asf: false
  Head:
    name: DBHead
    k: 50

Loss:
  name: DBLoss
  balance_loss: true
  main_loss_type: DiceLoss
  alpha: 5
  beta: 10
  ohem_ratio: 3

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    # 🎯 Optimized learning rate for batch_size=24
    learning_rate: 0.0015  # Scaled up from 0.0001 for larger batch
    warmup_epoch: 5  # Longer warmup for stability
  regularizer:
    name: L2
    factor: 1.0e-05  # Reduced L2 for better convergence

PostProcess:
  name: DBPostProcess
  thresh: 0.3
  box_thresh: 0.6
  max_candidates: 1000
  unclip_ratio: 1.5

Metric:
  name: DetMetric
  main_indicator: hmean

Train:
  dataset:
    name: SimpleDataSet
    data_dir: /home/pro301/paddleocr_training/data_new
    label_file_list:
      - /home/pro301/git/en-zine/ocr_system/paddleocr_training/data/train_list.txt
    ratio_list: [1.0]
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false

      # 🎨 Enhanced Data Augmentation
      - DetLabelEncode: null

      # Random rotation for better generalization
      - RandomRotate:
          max_angle: 15  # ±15 degrees
          rotate_ratio: 0.6

      # Color augmentation
      - ColorJitter:
          brightness: 0.3
          contrast: 0.3
          saturation: 0.3
          hue: 0.1
          prob: 0.5

      # Scale augmentation
      - RandomScale:
          scale_range: [0.7, 1.3]  # 70% to 130%
          prob: 0.6

      # Random flip
      - RandomFlip:
          flip_ratio: 0.5

      # Random crop for robustness
      - RandomCrop:
          size: [640, 640]
          main_key: image
          crop_keys: [image, polys, ignore_tags]

      - MakeBorderMap:
          shrink_ratio: 0.4
          thresh_min: 0.3
          thresh_max: 0.7

      - MakeShrinkMap:
          shrink_ratio: 0.4
          min_text_size: 8

      - NormalizeImage:
          scale: 1./255.
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
          order: hwc

      - ToCHWImage: null
      - KeepKeys:
          keep_keys: [image, threshold_map, threshold_mask, shrink_map, shrink_mask]

  loader:
    shuffle: true
    drop_last: false
    # 🚀 Ultra-Optimized Batch Configuration for RTX 5070 12GB
    batch_size_per_card: 24  # Maximized for 12GB VRAM
    num_workers: 8  # Parallel data loading (max efficiency)
    use_shared_memory: true  # Faster data transfer

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: /home/pro301/paddleocr_training/data_new
    label_file_list:
      - /home/pro301/git/en-zine/ocr_system/paddleocr_training/data/val_list.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - DetLabelEncode: null
      - DetResizeForTest:
          limit_side_len: 960
          limit_type: max
      - NormalizeImage:
          scale: 1./255.
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
          order: hwc
      - ToCHWImage: null
      - KeepKeys:
          keep_keys: [image, shape, polys, ignore_tags]

  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 8  # Smaller batch for evaluation
    num_workers: 4
    use_shared_memory: true
