# Generated: 2025-10-03 05:25:00 KST
# PaddleOCR Detection Training Configuration for 200 bbox training
# Optimized for Korean blog data with 30-300 bbox range
# Updated: 2025-10-04 - Switch to CPU mode (GPU Compute Capability 12.0 not supported)
Global:
  debug: false
  use_gpu: false  # Changed to CPU mode - RTX 5070 Ti (Compute 12.0) not supported by PaddlePaddle
  use_amp: false  # Disabled AMP for CPU mode
  epoch_num: 100
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: /home/pro301/paddleocr_training/output/data_200bbox/
  save_epoch_step: 10
  eval_batch_step: [0, 2000]
  cal_metric_during_train: false
  pretrained_model: null
  use_visualdl: false
  distributed: false

Architecture:
  model_type: det
  algorithm: DB
  Transform:
  Backbone:
    name: MobileNetV3
    scale: 0.5
    model_name: large
    disable_se: True
  Neck:
    name: RSEFPN
    out_channels: 96
    shortcut: True
  Head:
    name: DBHead
    k: 50

Loss:
  name: DBLoss
  balance_loss: true
  main_loss_type: DiceLoss
  alpha: 5
  beta: 10
  ohem_ratio: 3

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0001
    warmup_epoch: 2
  regularizer:
    name: L2
    factor: 5.0e-05

PostProcess:
  name: DBPostProcess
  thresh: 0.3
  box_thresh: 0.6
  max_candidates: 1000
  unclip_ratio: 1.5

Metric:
  name: DetMetric
  main_indicator: hmean

Train:
  dataset:
    name: SimpleDataSet
    data_dir: /home/pro301/paddleocr_training/data_new/
    label_file_list:
      - /home/pro301/git/en-zine/ocr_system/paddleocr_training/data/train_list.txt
    ratio_list: [1.0]
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - DetLabelEncode:
      - EastRandomCropData:
          size: [640, 640]
          max_tries: 10
          keep_ratio: true
      - MakeBorderMap:
          shrink_ratio: 0.4
          thresh_min: 0.3
          thresh_max: 0.7
      - MakeShrinkMap:
          shrink_ratio: 0.4
          min_text_size: 8
      - NormalizeImage:
          scale: 1./255.
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
          order: hwc
      - ToCHWImage:
      - KeepKeys:
          keep_keys: [image, threshold_map, threshold_mask, shrink_map, shrink_mask]
  loader:
    shuffle: true
    drop_last: false
    batch_size_per_card: 6  # Reduced from 24 for 200 bbox
    num_workers: 2  # Reduced to 2 for shared memory optimization

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: /home/pro301/paddleocr_training/data_new/
    label_file_list:
      - /home/pro301/git/en-zine/ocr_system/paddleocr_training/data/val_list.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - DetLabelEncode:
      - DetResizeForTest:
      - NormalizeImage:
          scale: 1./255.
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
          order: hwc
      - ToCHWImage:
      - KeepKeys:
          keep_keys: [image, shape, polys, ignore_tags]
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 1
    num_workers: 0
